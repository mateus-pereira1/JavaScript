<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antes e Depois</title>
</head>
<body>
    <h1>Antes e Depois</h1>

    <button class="antecessorSucessor">Antecessor e Sucessor</button>

    <script>
        let antecessorSucessor = window.document.querySelector('button.antecessorSucessor');

        antecessorSucessor.addEventListener('click', function(){
            let txtnumero = window.prompt('Digite um número inteiro qualquer');

            let numero = Number(txtnumero);

            let antes = numero - 1;
            let depois = numero + 1;

            window.alert(`Antes de ${numero}, temos o número ${antes}\nDepois de ${numero}, temos o número ${depois}`);

        })
    </script>
</body>
</html>

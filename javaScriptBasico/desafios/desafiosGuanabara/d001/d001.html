<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mensagens</title>
</head>
<body>
    <h1>Desafio das Mensagens</h1>

    <button class="botao1">Botão 1</button>
    <button class="botao2">Botão 2</button>
    <button class="botao3">Botão 3</button>


    <script>
        let botao1 = window.document.querySelector('button.botao1');

        let botao2 = window.document.querySelector('button.botao2');

        let botao3 = window.document.querySelector('button.botao3');

        botao1.addEventListener('click', function(){
            window.alert('Você clicou no 1° botão!')
        });

        botao2.addEventListener('click', function(){
            window.alert('Você clicou no 2° botão!')
        });

        botao3.addEventListener('click', function(){
            window.alert('Você clicou no 3° botão!')
        });


    </script>
</body>
</html>

<body>
    <header>
        <h1>Verificador de Idade</h1>

    <section>
        <div>
            <p>Ano de Nascimento: <input type="number" class="txtAno"></p>
            <p>
                     <input type="radio" name="radsex" id="masc" checked> Masculino
                    <input type="radio" name="radsex" id="fem"> Feminino
            </p>
            <p>
                <button onclick="verificar()">Verificar</button>

        </div>

        <div id="res">
            <p>Preencha os dados acima para verificar a idade!</p>
        </div>
    </section>
